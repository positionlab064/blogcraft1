name: Deploy

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  # ── Frontend → Cloudflare Pages ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Check dist
        run: ls -la dist/ && echo "Files count:" && find dist -type f | wc -l

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          echo "## Deploy Log" >> $GITHUB_STEP_SUMMARY

          # Check project exists via CF API
          echo "### CF Projects:" >> $GITHUB_STEP_SUMMARY
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); [print(p['name']) for p in d.get('result',[])]" >> $GITHUB_STEP_SUMMARY 2>&1

          # create if not exists
          npx wrangler@3 pages project create blogcraft-ai --production-branch=main >> $GITHUB_STEP_SUMMARY 2>&1 || true

          # deploy from a clean temp dir (no wrangler.toml)
          mkdir /tmp/cf_deploy
          cp -r dist/. /tmp/cf_deploy/
          echo "### Deploy output:" >> $GITHUB_STEP_SUMMARY
          npx wrangler@3 pages deploy /tmp/cf_deploy --project-name=blogcraft-ai 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          DEPLOY_EXIT=${PIPESTATUS[0]}

          echo "### Exit: $DEPLOY_EXIT" >> $GITHUB_STEP_SUMMARY
          exit $DEPLOY_EXIT
