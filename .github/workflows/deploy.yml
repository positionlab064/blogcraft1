name: Deploy

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  # ── Frontend → Cloudflare Pages ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "## Cloudflare Auth Check" >> $GITHUB_STEP_SUMMARY

          # Verify token
          VERIFY=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          echo "Token verify: $(echo $VERIFY | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("success"), d.get("result",{}).get("status",""))')" | tee -a $GITHUB_STEP_SUMMARY

          # List pages projects
          PROJECTS=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          echo "Projects success: $(echo $PROJECTS | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("success"), [p["name"] for p in d.get("result",[])])')" | tee -a $GITHUB_STEP_SUMMARY

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          WRANGLER="${{ github.workspace }}/node_modules/.bin/wrangler"

          # cd into temp dir so wrangler doesn't find wrangler.toml with D1 bindings
          mkdir /tmp/cf_deploy
          cp -r dist/. /tmp/cf_deploy/
          cd /tmp/cf_deploy

          $WRANGLER pages project create blogcraft-ai --production-branch=main 2>&1 || true

          OUTPUT=$($WRANGLER pages deploy . --project-name=blogcraft-ai 2>&1)
          DEPLOY_EXIT=$?

          echo "$OUTPUT"
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo "Exit: $DEPLOY_EXIT" >> $GITHUB_STEP_SUMMARY

          exit $DEPLOY_EXIT
