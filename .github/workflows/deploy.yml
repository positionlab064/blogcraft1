name: Deploy

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  # ── Frontend → Cloudflare Pages ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "## Cloudflare Deploy Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "=== whoami ===" | tee -a $GITHUB_STEP_SUMMARY
          npx wrangler whoami 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

          echo "=== project list ===" | tee -a $GITHUB_STEP_SUMMARY
          npx wrangler pages project list 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

          echo "=== create project (ignore if exists) ===" | tee -a $GITHUB_STEP_SUMMARY
          npx wrangler pages project create blogcraft-ai --production-branch=main 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

          echo "=== deploy ===" | tee -a $GITHUB_STEP_SUMMARY
          npx wrangler pages deploy dist --project-name=blogcraft-ai --commit-dirty=true 2>&1 | tee -a $GITHUB_STEP_SUMMARY

          echo '```' >> $GITHUB_STEP_SUMMARY
