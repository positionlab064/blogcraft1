name: Deploy

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  # ── Frontend → Cloudflare Pages ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: warn
        run: |
          set +e
          echo "## Deploy Log" >> $GITHUB_STEP_SUMMARY

          # wrangler version
          WRANGLER_VER=$(npx wrangler@3 --version 2>&1)
          echo "wrangler: $WRANGLER_VER" | tee -a $GITHUB_STEP_SUMMARY

          # create project if not exists
          echo "--- create project ---" >> $GITHUB_STEP_SUMMARY
          npx wrangler@3 pages project create blogcraft-ai --production-branch=main >> $GITHUB_STEP_SUMMARY 2>&1 || true

          # hide wrangler.toml to avoid D1 binding conflicts
          mv wrangler.toml wrangler.toml.bak

          # deploy
          echo "--- deploy ---" >> $GITHUB_STEP_SUMMARY
          DEPLOY_OUT=$(npx wrangler@3 pages deploy dist --project-name=blogcraft-ai 2>&1)
          DEPLOY_EXIT=$?
          echo "$DEPLOY_OUT" | tee -a $GITHUB_STEP_SUMMARY

          # restore
          mv wrangler.toml.bak wrangler.toml

          echo "--- exit code: $DEPLOY_EXIT ---" >> $GITHUB_STEP_SUMMARY
          exit $DEPLOY_EXIT
