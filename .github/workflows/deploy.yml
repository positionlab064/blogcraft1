name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Frontend → Cloudflare Pages ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WRANGLER="${{ github.workspace }}/node_modules/.bin/wrangler"
          mkdir /tmp/cf_deploy && cp -r dist/. /tmp/cf_deploy/ && cd /tmp/cf_deploy
          $WRANGLER pages project create blogcraft-ai --production-branch=main 2>&1 || true
          $WRANGLER pages deploy . --project-name=blogcraft-ai --branch=main --commit-dirty=true
